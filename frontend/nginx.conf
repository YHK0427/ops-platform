# 카카오톡 등 링크 미리보기 크롤러 판별 — 이 UA들만 /s/* 요청을 og 태그 전용
# 백엔드 라우트로 돌린다. SPA는 JS 렌더라 크롤러가 og:title/description을 못 읽어서
# 채점/피드백 링크를 카톡 등에 붙이면 죄다 "UnivPT Ops"로만 뜨던 문제 대응.
map $http_user_agent $scoring_og_bot {
    default                    0;
    "~*kakaotalk"               1;
    "~*facebookexternalhit"     1;
    "~*Twitterbot"               1;
    "~*Slackbot"                 1;
    "~*TelegramBot"              1;
    "~*LinkedInBot"              1;
    "~*WhatsApp"                 1;
    "~*Discordbot"               1;
    "~*NAVER-Blog-App"           1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 2G;

    # 클라이언트 → nginx 바디 전송 타임아웃 완화 (모바일 업로드 중 잠깐 멈춰도 유지)
    client_body_timeout   600s;
    send_timeout          600s;

    # univpt33 도메인 폐기 — 단일 도메인(univpt)으로 영구 리다이렉트
    if ($host = "univpt33.yhkkkkhy.my") {
        return 301 https://univpt.yhkkkkhy.my$request_uri;
    }

    # React SPA 라우팅 — HTML은 절대 캐시 금지
    # (번들은 hash-named라 캐시 OK, but index.html이 캐시되면 옛 번들 계속 참조)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        expires off;
    }

    # 심사 채점/피드백 공개 링크 — 링크 미리보기 크롤러만 og 태그 전용 백엔드 라우트로,
    # 나머지(실제 사용자)는 그대로 SPA로 보낸다.
    location ~ ^/s/(?<scoring_token>[^/]+)(?<scoring_feedback>/feedback)?/?$ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        if ($scoring_og_bot) {
            proxy_pass http://backend:8000/api/v1/public/scoring/$scoring_token/og?feedback=$scoring_feedback;
            break;
        }
        try_files /index.html /index.html;
    }

    # Service Worker — 캐시 금지 + Service-Worker-Allowed 헤더
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        expires off;
    }

    # 영상 직접 업로드 — 스트리밍(버퍼링 OFF) + 긴 타임아웃
    # 대용량 + 동시 업로드 대비: nginx가 전체 바디를 버퍼링하지 않고 바로 백엔드로 스트리밍
    location ~ ^/api/v1/sessions/[0-9]+/videos/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_request_buffering off;   # 클라 → 백엔드 스트리밍
        proxy_buffering         off;   # 백엔드 → 클라 스트리밍
        proxy_cache             off;

        proxy_read_timeout     1800s;  # 30분 — 느린 모바일 업로드 대비
        proxy_send_timeout     1800s;
        proxy_connect_timeout  10s;
    }

    # 실시간 피드백 WebSocket — Upgrade 헤더 필수 (긴 연결 유지)
    location /api/v1/live-feedback/ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    3600s;   # WS 유휴 유지 (하트비트 30s)
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
        proxy_cache           off;
    }

    # 심사 결과 실시간 갱신 WebSocket — Upgrade 헤더 필수
    # 주의: 아래 location /api/ 에는 Upgrade 헤더가 없어서, 이 블록이 없으면 WS가 붙지 않는다.
    location /api/v1/scoring/ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    3600s;   # WS 유휴 유지 (하트비트 30s)
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
        proxy_cache           off;
    }

    # API 프록시 → backend (Tier2)
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 크롤러 장시간 실행 대비 (영상 업로드 최대 10분)
        proxy_read_timeout    600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    600s;

        # SSE / 실시간 폴링 대비
        proxy_buffering    off;
        proxy_cache        off;
    }

    # 정적 자산 캐시
    location ~* \.(js|css|png|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 보안 헤더
    add_header X-Frame-Options            "DENY"        always;
    add_header X-Content-Type-Options     "nosniff"     always;
    add_header Referrer-Policy            "same-origin" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net https://*.r2.cloudflarestorage.com; frame-src https://www.youtube-nocookie.com https://www.youtube.com; worker-src 'self'" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
}
