server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 2G;

    # 클라이언트 → nginx 바디 전송 타임아웃 완화 (모바일 업로드 중 잠깐 멈춰도 유지)
    client_body_timeout   600s;
    send_timeout          600s;

    # React SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 영상 직접 업로드 — 스트리밍(버퍼링 OFF) + 긴 타임아웃
    # 대용량 + 동시 업로드 대비: nginx가 전체 바디를 버퍼링하지 않고 바로 백엔드로 스트리밍
    location ~ ^/api/v1/sessions/[0-9]+/videos/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_request_buffering off;   # 클라 → 백엔드 스트리밍
        proxy_buffering         off;   # 백엔드 → 클라 스트리밍
        proxy_cache             off;

        proxy_read_timeout     1800s;  # 30분 — 느린 모바일 업로드 대비
        proxy_send_timeout     1800s;
        proxy_connect_timeout  10s;
    }

    # API 프록시 → backend (Tier2)
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 크롤러 장시간 실행 대비 (영상 업로드 최대 10분)
        proxy_read_timeout    600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    600s;

        # SSE / 실시간 폴링 대비
        proxy_buffering    off;
        proxy_cache        off;
    }

    # 정적 자산 캐시
    location ~* \.(js|css|png|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 보안 헤더
    add_header X-Frame-Options            "DENY"        always;
    add_header X-Content-Type-Options     "nosniff"     always;
    add_header Referrer-Policy            "same-origin" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
}
